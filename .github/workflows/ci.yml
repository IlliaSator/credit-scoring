name: CI — Build and Test

# Запускается при каждом пуше в main
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Шаг 1 — скачиваем код
      - name: Checkout code
        uses: actions/checkout@v3

      # Шаг 2 — собираем Docker образ
      - name: Build Docker image
        run: docker build -t credit-scoring-api .

      # Шаг 3 — запускаем контейнер
      - name: Run container
        run: docker run -d -p 8000:8000 --name test-api credit-scoring-api

      # Шаг 4 — ждём пока API запустится
      - name: Wait for API
        run: sleep 10

      # Шаг 5 — проверяем что /health отвечает
      - name: Test health endpoint
        run: |
          curl -f http://localhost:8000/health || exit 1
          echo "API is healthy!"